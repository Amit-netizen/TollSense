name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests ──────────────────────────────────────────────────────────
  backend-test:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Coverage report
        run: go tool cover -func=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  # ─── Backend Build ──────────────────────────────────────────────────────────
  backend-build:
    name: Go Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build
        run: CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" -o tollsense ./cmd/server

      - name: Verify binary
        run: ls -lh tollsense

  # ─── Frontend Tests ─────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test -- --ci --passWithNoTests

  # ─── Frontend Build ─────────────────────────────────────────────────────────
  frontend-build:
    name: Next.js Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_WS_URL: ws://localhost:8080
        run: npm run build

  # ─── Integration Tests ──────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-build]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: tollsense
          POSTGRES_PASSWORD: tollsense123
          POSTGRES_DB: tollsense_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Seed database
        run: |
          PGPASSWORD=tollsense123 psql -h localhost -U tollsense -d tollsense_db \
            -f backend/migrations/init.sql

      - name: Build & start backend
        run: |
          cd backend
          go build -o tollsense ./cmd/server
          DATABASE_URL="postgres://tollsense:tollsense123@localhost:5432/tollsense_db?sslmode=disable" \
          JWT_SECRET="ci-test-secret" \
          PORT=8080 \
          ./tollsense &
          echo "Backend PID: $!"
          sleep 3

      - name: Run integration tests
        run: bash test_integration.sh http://localhost:8080

  # ─── Docker Build ──────────────────────────────────────────────────────────
  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          for i in {1..20}; do
            if curl -sf http://localhost:8080/health; then break; fi
            sleep 3
          done

      - name: Smoke test
        run: |
          curl -sf http://localhost:8080/health
          curl -sf http://localhost:3000 || true

      - name: Stop stack
        if: always()
        run: docker compose down -v
