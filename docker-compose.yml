version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: tollsense_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tollsense
      POSTGRES_PASSWORD: tollsense123
      POSTGRES_DB: tollsense_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tollsense -d tollsense_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tollsense_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tollsense:tollsense123@postgres:5432/tollsense_db?sslmode=disable
      JWT_SECRET: super-secret-jwt-key-change-in-prod
      PORT: 8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tollsense_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    ports:
      - "3000:3000"

volumes:
  pgdata:
